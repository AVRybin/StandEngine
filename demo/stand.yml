version: 1

stand:
  project: demo
  env: test
  users:
    sudo: av.rybin
    app: userapp
  ssh:
    key_name_admin: AVRybin

node_profiles:
  default:
    location: hel1
    type_serv: cpx32
    image: rocky-10
    network: network-p2p
    cloud-init: ./cloud-init.yaml.mako

from_dep_manifest: ./app-registry/registries.yml

apps:
  redpanda:
    from_dep_manifest: ./app-registry/redpanda/app.yml
    preferences:
      admin_user: cool_admin
      admin_pass: !secret redpanda-admin-password
    instances:
      redpanda-master:
        role: first-seed
        hooks: migration
      redpanda-seed-1:
        role: base-seed
      redpanda-seed-2:
        role: base-seed

  kafka-ui:
    from_dep_manifest: ./app-registry/kafka-ui/app.yml
    preferences:
      admin_user: cool_admin_ui
      admin_pass_bcrypt: !secret kafka-ui-admin-password-bcrypt
    instances:
      kafka-ui:
        role: ui

  redis:
    from_dep_manifest: ./app-registry/redis/app.yml
    preferences:
      admin_user: cool_admin_ui
      admin_pass: !secret demo-admin-password
    instances:
      master-redis:
        role: master-redis

  mongo:
    from_dep_manifest: ./app-registry/mongo/app.yml
    preferences:
      admin_user: cool_admin_ui
      admin_pass: !secret demo-admin-password
      replica_set_name: rs0
      replica_set_key: !secret mongo-replica-set-key
    instances:
      mongo-instance:
        role: member
        hooks: hook

nodes:
  master-server:
    profile: default
    apps:
      - redpanda-master
      - kafka-ui
      - master-redis
      - mongo-instance

  seed-server-1:
    profile: default
    apps:
      - redpanda-seed-1

  seed-server-2:
    profile: default
    apps:
      - redpanda-seed-2
